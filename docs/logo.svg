<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <rect width="16" height="16" rx="2" fill="#0c0c1a"/>

  <!-- Grid -->
  <line x1="4" y1="0" x2="4" y2="16" stroke="#1e2040" stroke-width="0.3"/>
  <line x1="8" y1="0" x2="8" y2="16" stroke="#1e2040" stroke-width="0.4"/>
  <line x1="12" y1="0" x2="12" y2="16" stroke="#1e2040" stroke-width="0.3"/>
  <line x1="0" y1="4" x2="16" y2="4" stroke="#1e2040" stroke-width="0.3"/>
  <line x1="0" y1="8" x2="16" y2="8" stroke="#1e2040" stroke-width="0.4"/>
  <line x1="0" y1="12" x2="16" y2="12" stroke="#1e2040" stroke-width="0.3"/>

  <!-- Edges -->
  <line x1="2" y1="6" x2="6" y2="10" stroke="#6a6adf" stroke-width="0.3" opacity="0.3"/>
  <line x1="6" y1="10" x2="6" y2="14" stroke="#6a6adf" stroke-width="0.3" opacity="0.25"/>
  <line x1="2" y1="6" x2="2" y2="14" stroke="#6a6adf" stroke-width="0.3" opacity="0.2"/>
  <line x1="10" y1="10" x2="14" y2="10" stroke="#6a6adf" stroke-width="0.3" opacity="0.25"/>
  <line x1="10" y1="10" x2="10" y2="14" stroke="#6a6adf" stroke-width="0.3" opacity="0.2"/>
  <line x1="6" y1="2" x2="10" y2="2" stroke="#6a6adf" stroke-width="0.3" opacity="0.2"/>

  <!-- Heatmap glow: pink/magenta blobs -->
  <circle cx="13" cy="11" r="3.5" fill="#e05aa0" opacity="0.2"/>
  <circle cx="3" cy="12" r="3" fill="#6a7adf" opacity="0.15"/>

  <!-- Blue/periwinkle supernodes (dominant) -->
  <circle cx="2" cy="6" r="1.5" fill="#7a8aef" opacity="0.9"/>
  <circle cx="2" cy="14" r="1.7" fill="#7a8aef" opacity="0.85"/>
  <circle cx="6" cy="14" r="1.3" fill="#7a8aef" opacity="0.75"/>
  <circle cx="6" cy="10" r="1.0" fill="#7a8aef" opacity="0.65"/>

  <!-- Pink/magenta supernodes -->
  <circle cx="10" cy="6" r="1.1" fill="#e05aa0" opacity="0.9"/>
  <circle cx="14" cy="10" r="1.5" fill="#e05aa0" opacity="0.85"/>
  <circle cx="14" cy="14" r="0.9" fill="#e05aa0" opacity="0.7"/>
  <circle cx="10" cy="10" r="0.8" fill="#e05aa0" opacity="0.6"/>

  <!-- Green accents -->
  <circle cx="2" cy="2" r="1.2" fill="#6ad67a" opacity="0.85"/>
  <circle cx="6" cy="2" r="0.7" fill="#6ad67a" opacity="0.6"/>
  <circle cx="10" cy="2" r="0.5" fill="#6ad67a" opacity="0.4"/>

  <!-- Small purple dots -->
  <circle cx="14" cy="2" r="0.6" fill="#9a6adf" opacity="0.55"/>
  <circle cx="14" cy="6" r="0.5" fill="#9a6adf" opacity="0.4"/>
</svg>
